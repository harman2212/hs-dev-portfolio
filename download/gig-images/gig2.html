<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @page { size: 1280px 769px; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 1280px; height: 769px; overflow: hidden; font-family: 'Inter', sans-serif; background: #070b14; }
  .gig { width: 1280px; height: 769px; position: relative; overflow: hidden; background: #070b14; }
  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('./bg2.png') center/cover no-repeat; opacity: 0.35; }
  .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(160deg, rgba(7,11,20,0.92) 0%, rgba(15,23,42,0.8) 40%, rgba(7,11,20,0.92) 100%); }
  .glow { position: absolute; border-radius: 50%; filter: blur(90px); }
  .g1 { width: 350px; height: 350px; background: #06b6d4; opacity: 0.08; top: -100px; left: 200px; }
  .g2 { width: 250px; height: 250px; background: #3b82f6; opacity: 0.06; bottom: -60px; right: 150px; }

  /* Top bar */
  .top-line { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #06b6d4, #3b82f6, #8b5cf6); z-index: 10; }

  /* Center content */
  .center { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 80px; }
  .label { font-size: 12px; font-weight: 700; color: #22d3ee; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }
  .title { font-size: 40px; font-weight: 900; color: #fff; text-align: center; line-height: 1.2; margin-bottom: 12px; letter-spacing: -0.5px; }
  .title span { color: #22d3ee; }
  .tagline { font-size: 16px; color: #64748b; text-align: center; margin-bottom: 40px; font-weight: 400; }

  /* Service cards row */
  .services { display: flex; gap: 14px; margin-bottom: 36px; flex-wrap: wrap; justify-content: center; }
  .svc { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; min-width: 180px; }
  .svc-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .svc-icon svg { width: 18px; height: 18px; }
  .si-blue { background: rgba(59,130,246,0.12); }
  .si-blue svg { fill: #3b82f6; }
  .si-cyan { background: rgba(6,182,212,0.12); }
  .si-cyan svg { fill: #06b6d4; }
  .si-green { background: rgba(34,197,94,0.12); }
  .si-green svg { fill: #22c55e; }
  .si-purple { background: rgba(139,92,246,0.12); }
  .si-purple svg { fill: #8b5cf6; }
  .si-amber { background: rgba(245,158,11,0.12); }
  .si-amber svg { fill: #f59e0b; }
  .svc-text { font-size: 13px; font-weight: 600; color: #e2e8f0; }

  /* Bottom tech pills + CTA */
  .bottom { display: flex; align-items: center; gap: 32px; }
  .techs { display: flex; gap: 8px; flex-wrap: wrap; }
  .t { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 6px 14px; font-size: 11.5px; font-weight: 600; color: #94a3b8; font-family: 'JetBrains Mono', monospace; }
  .cta { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #1dbf73, #19a463); border-radius: 8px; padding: 10px 24px; }
  .cta span { font-size: 13px; font-weight: 700; color: #fff; }
  .cta svg { width: 16px; height: 16px; fill: #fff; }

  /* Watermark */
  .watermark { position: absolute; bottom: 18px; right: 64px; font-size: 11px; color: #334155; font-family: 'JetBrains Mono', monospace; z-index: 10; }
  .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #06b6d4, #3b82f6, #8b5cf6); z-index: 10; }
</style>
</head>
<body>
<div class="gig">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="top-line"></div>

  <div class="center">
    <div class="label">Professional Web Development</div>
    <div class="title">From Idea to <span>Live Website</span></div>
    <div class="tagline">Landing Pages, Business Sites, Portfolios, SaaS Frontends, Custom Web Apps</div>

    <div class="services">
      <div class="svc">
        <div class="svc-icon si-blue"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg></div>
        <div class="svc-text">Landing Pages</div>
      </div>
      <div class="svc">
        <div class="svc-icon si-cyan"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
        <div class="svc-text">Business Sites</div>
      </div>
      <div class="svc">
        <div class="svc-icon si-green"><svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 12 7.4l3.38 4.6L17 10.83 14.92 8H20v6z"/></svg></div>
        <div class="svc-text">Portfolio Sites</div>
      </div>
      <div class="svc">
        <div class="svc-icon si-purple"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
        <div class="svc-text">SaaS Frontends</div>
      </div>
      <div class="svc">
        <div class="svc-icon si-amber"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg></div>
        <div class="svc-text">Custom Apps</div>
      </div>
    </div>

    <div class="bottom">
      <div class="techs">
        <div class="t">Next.js</div><div class="t">React</div><div class="t">TypeScript</div><div class="t">Tailwind</div><div class="t">Node.js</div>
      </div>
      <div class="cta">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <span>Order Now</span>
      </div>
    </div>
  </div>

  <div class="watermark">by Harman</div>
  <div class="bottom-bar"></div>
</div>
</body>
</html>
